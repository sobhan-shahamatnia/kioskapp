<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JinKo Solar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="css/loading.css">
</head>
<body>

  <div class="ld-screen" id="loadingScreen" aria-live="polite" aria-label="Loading">
    <img src="assets/logo.png" alt="JinKo Solar" class="ld-logo">
    <div class="ld-dots" aria-hidden="true">
      <span class="ld-dot"></span>
      <span class="ld-dot ld-dot--2"></span>
      <span class="ld-dot ld-dot--3"></span>
    </div>
  </div>

  <!-- redirect to home after load -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var screen = document.getElementById('loadingScreen');
        screen.classList.add('ld-screen--fade');
        setTimeout(function () {
          window.location.href = 'index.html';
        }, 600);
      }, 1800);
    });
  </script>

</body>
</html>
